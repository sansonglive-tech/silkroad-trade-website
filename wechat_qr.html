<!DOCTYPE html>
<html>
<head>
<style>
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
.qr-container { background: white; padding: 40px; border-radius: 12px; text-align: center; }
.qr-title { font-size: 18px; margin-bottom: 20px; color: #333; }
.qr-code { width: 280px; height: 280px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.qr-hint { margin-top: 20px; color: #666; font-size: 14px; }
</style>
</head>
<body>
<div class="qr-container">
  <div class="qr-title">添加我为朋友</div>
  <div class="qr-code">
    <span>请上传微信二维码图片</span>
  </div>
  <div class="qr-hint">扫二维码，添加我为朋友</div>
</div>
</body>
</html>
